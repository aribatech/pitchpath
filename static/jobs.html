<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jobs - PitchPath</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="max-w-3xl mx-auto mt-12 px-4 pb-16">

  <div class="flex justify-between items-center mb-8">
    <a href="profile.html" class="text-sm text-gray-500">← Back</a>
    <a href="tracker.html" class="text-sm text-gray-500">Tracker →</a>
  </div>

  <h1 class="text-xl font-bold mb-1">Matched Internships</h1>
  <p id="sub" class="text-sm text-gray-500 mb-6"></p>

  <table class="w-full text-sm border-collapse">
    <thead>
      <tr class="border-b border-gray-200">
        <th class="text-left py-2 text-xs text-gray-400 uppercase tracking-wider w-16">Score</th>
        <th class="text-left py-2 text-xs text-gray-400 uppercase tracking-wider">Role</th>
        <th class="text-left py-2 text-xs text-gray-400 uppercase tracking-wider">Company</th>
        <th class="py-2"></th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center px-4 z-50">
    <div class="bg-white w-full max-w-lg max-h-screen overflow-y-auto p-6 border border-gray-200">
      <h2 id="modal-title" class="text-base font-bold mb-5"></h2>
      <div id="modal-body" class="text-sm mb-6"></div>
      <div class="flex gap-3">
        <button onclick="applyJob()" class="bg-black text-white px-5 py-2 text-sm">Apply and Track</button>
        <button onclick="closeModal()" class="border border-gray-300 text-gray-600 px-5 py-2 text-sm">Close</button>
      </div>
      <p id="modal-msg" class="mt-3 text-sm text-gray-500"></p>
    </div>
  </div>

<script>
  var API = window.location.hostname === 'localhost' ? 'http://localhost:8888' : '';
  var matches = JSON.parse(localStorage.getItem('matches') || '[]');
  var pid = localStorage.getItem('profile_id');
  var currentMatch = null;

  document.getElementById('sub').textContent = matches.length + ' jobs found';

  var tbody = document.getElementById('rows');
  for (var i = 0; i < matches.length; i++) {
    var m = matches[i];
    var tr = document.createElement('tr');
    tr.className = 'border-b border-gray-100';
    var applyLink = m.apply_url ? '<a href="' + m.apply_url + '" target="_blank" class="text-xs text-gray-400 underline ml-3">Link</a>' : '';
    tr.innerHTML =
      '<td class="py-3 font-bold">' + m.match_score + '</td>' +
      '<td class="py-3 font-medium">' + m.job_title + '</td>' +
      '<td class="py-3 text-gray-500">' + m.company + '</td>' +
      '<td class="py-3 whitespace-nowrap text-right"><button class="border border-gray-300 px-3 py-1 text-xs" onclick="openModal(' + i + ')">View</button>' + applyLink + '</td>';
    tbody.appendChild(tr);
  }

  function openModal(index) {
    currentMatch = matches[index];
    document.getElementById('modal-title').textContent = currentMatch.job_title + ' at ' + currentMatch.company;
    document.getElementById('modal-body').innerHTML = '<p class="text-gray-400">Loading...</p>';
    document.getElementById('modal-msg').textContent = '';
    document.getElementById('modal').style.display = 'flex';

    fetch(API + '/jobs/' + currentMatch.job_id + '/gap/' + pid)
      .then(function(res) { return res.json(); })
      .then(function(data) {
        var html = '';

        html += '<p class="text-xs text-gray-400 uppercase tracking-wider mb-2">Matching Skills</p>';
        html += '<div class="flex flex-wrap gap-2 mb-4">';
        for (var i = 0; i < (data.matching_skills || []).length; i++) {
          html += '<span class="border border-gray-300 px-2 py-0.5 text-xs text-gray-700">' + data.matching_skills[i] + '</span>';
        }
        html += '</div>';

        html += '<p class="text-xs text-gray-400 uppercase tracking-wider mb-2">Missing Skills</p>';
        html += '<div class="flex flex-wrap gap-2 mb-4">';
        for (var j = 0; j < (data.missing_skills || []).length; j++) {
          html += '<span class="border border-gray-300 px-2 py-0.5 text-xs text-gray-400">' + data.missing_skills[j] + '</span>';
        }
        html += '</div>';

        html += '<p class="text-xs text-gray-400 uppercase tracking-wider mb-2">Recommendation</p>';
        html += '<p class="text-sm text-gray-600 leading-relaxed">' + (data.recommendation || '-') + '</p>';

        if (currentMatch.apply_url) {
          html += '<a href="' + currentMatch.apply_url + '" target="_blank" class="inline-block mt-4 text-sm underline text-gray-500">Open job posting →</a>';
        }

        document.getElementById('modal-body').innerHTML = html;
      })
      .catch(function() {
        document.getElementById('modal-body').innerHTML = '<p class="text-gray-400">Could not load details.</p>';
      });
  }

  function closeModal() {
    document.getElementById('modal').style.display = 'none';
    currentMatch = null;
  }

  function applyJob() {
    document.getElementById('modal-msg').textContent = 'Applying...';
    var body = { profile_id: pid, match_id: currentMatch.id, company: currentMatch.company, role: currentMatch.job_title, notes: '' };
    fetch(API + '/tracker/apply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })
    .then(function(res) {
      if (res.ok) { location.href = 'tracker.html'; }
      else { document.getElementById('modal-msg').textContent = 'Something went wrong.'; }
    })
    .catch(function() { document.getElementById('modal-msg').textContent = 'Something went wrong.'; });
  }
</script>
</body>
</html>
