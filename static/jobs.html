<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jobs</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="max-w-2xl mx-auto mt-16 px-4">

  <div class="flex gap-4 text-sm mb-6">
    <a href="profile.html">Back</a>
    <a href="tracker.html">Tracker</a>
  </div>

  <h1 class="text-xl font-bold mb-1">Matched Internships</h1>
  <p id="sub" class="text-sm text-gray-500 mb-6"></p>

  <table class="w-full text-sm border-collapse">
    <thead>
      <tr class="border-b text-xs text-gray-400">
        <th class="text-left py-2 w-14">Score</th>
        <th class="text-left py-2">Role</th>
        <th class="text-left py-2">Company</th>
        <th class="py-2"></th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-start justify-center pt-20">
    <div class="bg-white w-full max-w-lg p-6 max-h-screen overflow-y-auto">
      <h2 id="modal-title" class="font-bold mb-4"></h2>
      <div id="modal-body" class="text-sm mb-6"></div>
      <button onclick="applyJob()" class="border px-3 py-1 text-sm">Apply and Track</button>
      <button onclick="closeModal()" class="border px-3 py-1 text-sm ml-2">Close</button>
      <p id="modal-msg" class="mt-3 text-sm"></p>
    </div>
  </div>

<script>
  var API = window.location.hostname === 'localhost' ? 'http://localhost:8888' : '';
  var matches = JSON.parse(localStorage.getItem('matches') || '[]');
  var pid = localStorage.getItem('profile_id');
  var currentMatch = null;

  document.getElementById('sub').textContent = matches.length + ' jobs found';

  var tbody = document.getElementById('rows');
  for (var i = 0; i < matches.length; i++) {
    var m = matches[i];
    var tr = document.createElement('tr');
    tr.className = 'border-b';
    var applyLink = m.apply_url ? '<a href="' + m.apply_url + '" target="_blank" class="text-xs text-blue-500 underline ml-2">Job Link</a>' : '';
    tr.innerHTML = '<td class="py-3 font-bold">' + m.match_score + '</td>' +
      '<td class="py-3">' + m.job_title + '</td>' +
      '<td class="py-3 text-gray-500">' + m.company + '</td>' +
      '<td class="py-3 whitespace-nowrap"><button class="border px-3 py-1 text-sm" onclick="openModal(' + i + ')">View</button>' + applyLink + '</td>';
    tbody.appendChild(tr);
  }

  function openModal(index) {
    currentMatch = matches[index];

    document.getElementById('modal-title').textContent = currentMatch.job_title + ' at ' + currentMatch.company;
    document.getElementById('modal-body').textContent = 'Loading...';
    document.getElementById('modal-msg').textContent = '';
    document.getElementById('modal').style.display = 'flex';

    fetch(API + '/jobs/' + currentMatch.job_id + '/gap/' + pid)
      .then(function(res) { return res.json(); })
      .then(function(data) {
        var html = '';

        html += '<p class="text-xs text-gray-400 mb-1">Matching Skills</p>';
        html += '<div class="mb-3">';
        for (var i = 0; i < (data.matching_skills || []).length; i++) {
          html += '<span class="border px-2 py-0.5 text-xs mr-1 mb-1 inline-block">' + data.matching_skills[i] + '</span>';
        }
        html += '</div>';

        html += '<p class="text-xs text-gray-400 mb-1">Missing Skills</p>';
        html += '<div class="mb-3">';
        for (var j = 0; j < (data.missing_skills || []).length; j++) {
          html += '<span class="border border-red-300 text-red-500 px-2 py-0.5 text-xs mr-1 mb-1 inline-block">' + data.missing_skills[j] + '</span>';
        }
        html += '</div>';

        html += '<p class="text-xs text-gray-400 mb-1">Recommendation</p>';
        html += '<p class="text-sm text-gray-600">' + (data.recommendation || '') + '</p>';

        if (currentMatch.apply_url) {
          html += '<p class="mt-4"><a href="' + currentMatch.apply_url + '" target="_blank" class="text-sm text-blue-500 underline">Open job link</a></p>';
        }

        document.getElementById('modal-body').innerHTML = html;
      })
      .catch(function() {
        document.getElementById('modal-body').textContent = 'Could not load details.';
      });
  }

  function closeModal() {
    document.getElementById('modal').style.display = 'none';
    currentMatch = null;
  }

  function applyJob() {
    document.getElementById('modal-msg').textContent = 'Applying...';

    var body = {
      profile_id: pid,
      match_id: currentMatch.id,
      company: currentMatch.company,
      role: currentMatch.job_title,
      notes: ''
    };

    fetch(API + '/tracker/apply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })
    .then(function(res) {
      if (res.ok) {
        location.href = 'tracker.html';
      } else {
        document.getElementById('modal-msg').textContent = 'Something went wrong.';
      }
    })
    .catch(function() {
      document.getElementById('modal-msg').textContent = 'Something went wrong.';
    });
  }
</script>
</body>
</html>
