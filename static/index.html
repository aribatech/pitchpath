<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PitchPath AI</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="max-w-md mx-auto mt-24 px-4">

  <h1 class="text-2xl font-bold mb-1">PitchPath AI</h1>
  <p class="text-sm text-gray-500 mb-8">Upload your resume PDF to get started.</p>

  <label class="block text-xs text-gray-500 mb-1">Resume PDF</label>
  <input type="file" id="file" accept=".pdf" class="block w-full text-sm mb-5 border border-gray-300 px-3 py-2">

  <div class="flex gap-3">
    <button onclick="upload()" id="btn" class="bg-black text-white px-5 py-2 text-sm">Upload Resume</button>
    <a href="profiles.html" class="border border-gray-300 text-gray-600 px-5 py-2 text-sm">All Profiles</a>
  </div>
  <p id="msg" class="mt-4 text-sm text-gray-500"></p>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:8888' : '';
async function upload() {
  const file = document.getElementById('file').files[0];
  if (!file) return alert('Select a PDF.');
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  btn.disabled = true; btn.textContent = 'Uploading...';
  msg.textContent = 'Parsing resume with AI...';
  msg.className = 'mt-4 text-sm text-gray-500';
  try {
    const form = new FormData();
    form.append('file', file);
    const res = await fetch(`${API}/resume/upload`, { method: 'POST', body: form });
    if (!res.ok) { const e = await res.json().catch(()=>({detail:'Upload failed'})); throw new Error(e.detail); }
    const data = await res.json();
    localStorage.setItem('profile_id', data.id);
    localStorage.setItem('profile', JSON.stringify(data));
    localStorage.setItem('keywords', JSON.stringify(data.keywords || []));
    location.href = 'profile.html';
  } catch(e) {
    msg.textContent = e.message;
    msg.className = 'mt-4 text-sm text-red-500';
    btn.disabled = false; btn.textContent = 'Upload Resume';
  }
}
</script>
</body>
</html>
