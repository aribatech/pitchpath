<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tracker - PitchPath</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="max-w-xl mx-auto mt-12 px-4 pb-16">

  <div class="flex justify-between items-center mb-8">
    <a href="jobs.html" class="text-sm text-gray-500">← Jobs</a>
    <a href="profile.html" class="text-sm text-gray-500">Profile</a>
  </div>

  <h1 class="text-xl font-bold mb-1">Application Tracker</h1>
  <p id="sub" class="text-sm text-gray-500 mb-8">Loading...</p>

  <div id="apps"></div>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:8888' : '';
const pid = localStorage.getItem('profile_id');
if (!pid) location.href = 'index.html';

const STATUSES = ['applied','interview','offer','rejected','no_reply'];

async function load() {
  const res = await fetch(`${API}/tracker/${pid}`);
  const data = await res.json();
  const apps = data.applications || [];
  document.getElementById('sub').textContent = `${apps.length} application${apps.length !== 1 ? 's' : ''}`;
  const el = document.getElementById('apps');
  el.innerHTML = '';

  if (!apps.length) {
    el.innerHTML = '<p class="text-sm text-gray-400">No applications yet.</p>';
    return;
  }

  apps.forEach(a => {
    const div = document.createElement('div');
    div.className = 'border-t border-gray-200 py-6';
    div.innerHTML = `
      <div class="flex justify-between items-start mb-4">
        <div>
          <p class="font-semibold">${a.role}</p>
          <p class="text-sm text-gray-500">${a.company}</p>
          <p class="text-xs text-gray-400 mt-1">${new Date(a.applied_at).toLocaleDateString()}</p>
        </div>
        <span class="text-xs text-gray-400 border border-gray-200 px-2 py-0.5">${a.status.replace('_',' ')}</span>
      </div>

      <label class="block text-xs text-gray-400 mb-1">Status</label>
      <select id="s-${a.id}" class="border border-gray-300 px-3 py-1.5 text-sm mb-3 w-full">
        ${STATUSES.map(s=>`<option value="${s}" ${s===a.status?'selected':''}>${s.replace('_',' ')}</option>`).join('')}
      </select>

      <label class="block text-xs text-gray-400 mb-1">Note</label>
      <input id="n-${a.id}" value="${a.notes||''}" placeholder="Add a note..." class="border border-gray-300 px-3 py-1.5 text-sm mb-4 w-full">

      <div class="flex gap-2">
        <button onclick="update('${a.id}')" class="bg-black text-white px-4 py-1.5 text-xs">Save</button>
        <button onclick="del('${a.id}')" class="border border-gray-300 text-gray-500 px-4 py-1.5 text-xs">Delete</button>
      </div>`;
    el.appendChild(div);
  });
}

async function update(id) {
  await fetch(`${API}/tracker/${id}/status`, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ status: document.getElementById(`s-${id}`).value, notes: document.getElementById(`n-${id}`).value })
  });
  load();
}

async function del(id) {
  if (!confirm('Delete?')) return;
  await fetch(`${API}/tracker/${id}`, { method: 'DELETE' });
  load();
}

load();
</script>
</body>
</html>
