<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="max-w-md mx-auto mt-16 px-4">

  <a href="index.html" class="text-sm">Back</a>

  <h1 id="name" class="text-xl font-bold mt-4 mb-1">—</h1>
  <p id="contact" class="text-sm text-gray-500 mb-6">—</p>

  <p class="text-xs text-gray-400 mb-1">Skills</p>
  <div id="skills" class="flex flex-wrap gap-2 mb-5"></div>

  <p class="text-xs text-gray-400 mb-1">Experience</p>
  <ul id="exp" class="text-sm mb-5 list-disc list-inside">—</ul>

  <p class="text-xs text-gray-400 mb-1">Education</p>
  <ul id="edu" class="text-sm mb-5 list-disc list-inside">—</ul>

  <p class="text-xs text-gray-400 mb-1">Summary</p>
  <p id="summary" class="text-sm text-gray-600 mb-8">—</p>

  <hr class="mb-6">

  <p class="text-xs text-gray-400 mb-1">Keyword — AI suggested based on your resume:</p>
  <div id="suggestions" class="flex flex-wrap gap-2 mb-2"></div>
  <input id="keyword" placeholder="Pick one above or type your own" class="border px-2 py-1 text-sm mb-4 w-full">

  <p class="text-xs text-gray-400 mb-1">Location</p>
  <input id="location" value="remote" class="border px-2 py-1 text-sm mb-4 w-full">

  <button onclick="match()" id="btn" class="border px-3 py-1 text-sm">Find Internships</button>
  <p id="msg" class="mt-3 text-sm text-gray-500"></p>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:8888' : '';
const p = JSON.parse(localStorage.getItem('profile') || '{}');
const pid = localStorage.getItem('profile_id');
if (!pid) location.href = 'index.html';

document.getElementById('name').textContent = p.name || '—';
document.getElementById('contact').textContent = [p.email, p.phone].filter(Boolean).join(' | ');
document.getElementById('skills').innerHTML = (p.skills || []).map(s => `<span class="border px-2 py-0.5 text-xs">${s}</span>`).join('');
document.getElementById('exp').innerHTML = (p.experience || []).map(e => `<li>${e.title} at ${e.company} (${e.duration})</li>`).join('') || '<li>—</li>';
const edu = p.education;
document.getElementById('edu').innerHTML = edu ? `<li>${edu.degree} — ${edu.institution} (${edu.years})</li>` : '<li>—</li>';
document.getElementById('summary').textContent = p.summary || '—';

var keywords = p.keywords || JSON.parse(localStorage.getItem('keywords') || '[]');
var el = document.getElementById('suggestions');
keywords.forEach(function(kw) {
  var btn = document.createElement('button');
  btn.textContent = kw;
  btn.className = 'border px-2 py-0.5 text-xs';
  btn.onclick = function() {
    document.getElementById('keyword').value = kw;
    el.querySelectorAll('button').forEach(function(b) { b.style.fontWeight = 'normal'; });
    btn.style.fontWeight = 'bold';
  };
  el.appendChild(btn);
});

async function match() {
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  const keyword = document.getElementById('keyword').value.trim();
  const loc = document.getElementById('location').value.trim();
  if (!keyword) { alert('Please enter a keyword.'); return; }
  if (!loc) { alert('Please enter a location.'); return; }
  btn.disabled = true; btn.textContent = 'Searching...';
  msg.textContent = 'Fetching jobs and scoring with AI, this takes around 20 seconds...';
  const params = new URLSearchParams({ keyword: keyword, location: loc, top_n: 10 });
  try {
    const res = await fetch(`${API}/jobs/match/${pid}?${params}`, { method: 'POST' });
    if (!res.ok) { const e = await res.json().catch(()=>({detail:'Failed'})); throw new Error(e.detail); }
    const data = await res.json();
    localStorage.setItem('matches', JSON.stringify(data.matches));
    location.href = 'jobs.html';
  } catch(e) {
    msg.textContent = e.message;
    msg.className = 'mt-3 text-sm text-red-500';
    btn.disabled = false; btn.textContent = 'Find Internships';
  }
}
</script>
</body>
</html>
