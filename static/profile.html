<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile - PitchPath</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="max-w-lg mx-auto mt-12 px-4 pb-16">

  <a href="index.html" class="text-sm text-gray-500">← PitchPath</a>

  <h1 id="name" class="text-2xl font-bold mt-6 mb-1">-</h1>
  <p id="contact" class="text-sm text-gray-500 mb-8">-</p>

  <p class="text-xs text-gray-400 uppercase tracking-wider mb-2">Skills</p>
  <div id="skills" class="flex flex-wrap gap-2 mb-8"></div>

  <p class="text-xs text-gray-400 uppercase tracking-wider mb-2">Experience</p>
  <ul id="exp" class="text-sm text-gray-700 space-y-1 list-disc list-inside mb-8"></ul>

  <p class="text-xs text-gray-400 uppercase tracking-wider mb-2">Education</p>
  <ul id="edu" class="text-sm text-gray-700 list-disc list-inside mb-8"></ul>

  <p class="text-xs text-gray-400 uppercase tracking-wider mb-2">Summary</p>
  <p id="summary" class="text-sm text-gray-600 leading-relaxed mb-10">-</p>

  <hr class="border-gray-200 mb-8">

  <p class="text-xs text-gray-400 uppercase tracking-wider mb-2">AI Suggested Keywords</p>
  <div id="suggestions" class="flex flex-wrap gap-2 mb-4"></div>

  <label class="block text-xs text-gray-500 mb-1">Keyword</label>
  <input id="keyword" placeholder="Pick one above or type your own" class="border border-gray-300 px-3 py-2 text-sm mb-4 w-full">

  <label class="block text-xs text-gray-500 mb-1">Location</label>
  <input id="location" value="remote" class="border border-gray-300 px-3 py-2 text-sm mb-6 w-full">

  <button onclick="match()" id="btn" class="bg-black text-white px-6 py-2 text-sm w-full">Find Internships</button>
  <p id="msg" class="mt-3 text-sm text-gray-500"></p>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:8888' : '';
const p = JSON.parse(localStorage.getItem('profile') || '{}');
const pid = localStorage.getItem('profile_id');
if (!pid) location.href = 'index.html';

document.getElementById('name').textContent = p.name || '-';
document.getElementById('contact').textContent = [p.email, p.phone].filter(Boolean).join(' | ');
document.getElementById('skills').innerHTML = (p.skills || []).map(s => `<span class="border border-gray-300 px-2 py-0.5 text-xs text-gray-700">${s}</span>`).join('');
document.getElementById('exp').innerHTML = (p.experience || []).map(e => `<li>${e.title} at ${e.company} (${e.duration})</li>`).join('') || '<li>-</li>';
const edu = p.education;
document.getElementById('edu').innerHTML = edu ? `<li>${edu.degree} - ${edu.institution} (${edu.years})</li>` : '<li>-</li>';
document.getElementById('summary').textContent = p.summary || '-';

var keywords = p.keywords || JSON.parse(localStorage.getItem('keywords') || '[]');
var el = document.getElementById('suggestions');
keywords.forEach(function(kw) {
  var btn = document.createElement('button');
  btn.textContent = kw;
  btn.className = 'border border-gray-300 px-3 py-1 text-xs text-gray-600';
  btn.onclick = function() {
    document.getElementById('keyword').value = kw;
    el.querySelectorAll('button').forEach(function(b) { b.className = 'border border-gray-300 px-3 py-1 text-xs text-gray-600'; });
    btn.className = 'border border-black px-3 py-1 text-xs font-semibold';
  };
  el.appendChild(btn);
});

async function match() {
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  const keyword = document.getElementById('keyword').value.trim();
  const loc = document.getElementById('location').value.trim();
  if (!keyword) { alert('Please enter a keyword.'); return; }
  if (!loc) { alert('Please enter a location.'); return; }
  btn.disabled = true; btn.textContent = 'Searching...';
  msg.textContent = 'Fetching jobs and scoring with AI, takes ~20 seconds...';
  msg.className = 'mt-3 text-sm text-gray-500';
  const params = new URLSearchParams({ keyword: keyword, location: loc, top_n: 10 });
  try {
    const res = await fetch(`${API}/jobs/match/${pid}?${params}`, { method: 'POST' });
    if (!res.ok) { const e = await res.json().catch(()=>({detail:'Failed'})); throw new Error(e.detail); }
    const data = await res.json();
    localStorage.setItem('matches', JSON.stringify(data.matches));
    location.href = 'jobs.html';
  } catch(e) {
    msg.textContent = e.message;
    msg.className = 'mt-3 text-sm text-red-500';
    btn.disabled = false; btn.textContent = 'Find Internships';
  }
}
</script>
</body>
</html>
